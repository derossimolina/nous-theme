<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">
<head>{{ partial "head.html" . }}</head>
<body>
  {{ partial "header.html" . }}
  <main class="site-wrap">
    <article>
      <div class="post-header">
        <h1>{{ .Title }}</h1>
        <div class="post-meta">
          {{ .Date.Format "2 January 2006" }}
          {{ with .Params.tags }} · {{ range . }}<a href="/tags/{{ . | urlize }}" class="tag-pill">{{ . }}</a> {{ end }}{{ end }}
        </div>
      </div>
      <div class="post-content">
        {{ .Content }}
      </div>
    </article>
  </main>
  {{ partial "footer.html" . }}
</body>
</html>
