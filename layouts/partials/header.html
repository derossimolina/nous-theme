<header class="site-header">
  <div class="site-wrap">
    <a class="site-title" href="/">{{ .Site.Params.shortTitle | default .Site.Title }}</a>
    <button class="nav-toggle" id="nav-toggle" aria-label="Menu">
      <span class="nav-toggle-icon"></span>
    </button>
    <nav id="site-nav">
      <ul class="site-nav">
        {{ range .Site.Menus.main }}
        <li><a href="{{ .URL }}"{{ if eq $.RelPermalink .URL }} class="active"{{ end }}>{{ .Name }}</a></li>
        {{ end }}
        <li><button class="theme-toggle" id="theme-toggle" title="Toggle dark/light mode"><span class="icon-sun">☀</span><span class="icon-moon">☾</span></button></li>
      </ul>
    </nav>
  </div>
</header>
